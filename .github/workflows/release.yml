name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilers (linux/aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin animus-transport-http

      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          stage="animus-transport-http-${version}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          cp "target/${{ matrix.target }}/release/animus-transport-http" "dist/${stage}/"
          cp README.md LICENSE plugin.toml "dist/${stage}/"
          tar -czf "dist/${stage}.tar.gz" -C dist "${stage}"
          ( cd dist && shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256" )
          echo "asset=dist/${stage}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${stage}.tar.gz.sha256" >> "$GITHUB_OUTPUT"
          echo "stage=${stage}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign archive with cosign (keyless)
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          cosign sign-blob \
            --yes \
            --bundle "${{ steps.package.outputs.stage }}.tar.gz.bundle" \
            "${{ steps.package.outputs.stage }}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: animus-transport-http-${{ matrix.target }}
          path: |
            dist/${{ steps.package.outputs.stage }}.tar.gz
            dist/${{ steps.package.outputs.stage }}.tar.gz.sha256
            dist/${{ steps.package.outputs.stage }}.tar.gz.bundle

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.tar.gz.bundle
          generate_release_notes: true
