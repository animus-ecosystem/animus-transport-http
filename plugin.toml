schema = "animus.plugin.v1"
name = "animus-transport-http"
version = "0.2.3"
plugin_kind = "transport_backend"
description = "HTTP REST transport plugin for Animus — exposes daemon control as /api/v1/* endpoints"

[capabilities]
streaming = true
progress = false
cancellation = false
methods = [
  "transport/start",
  "transport/shutdown",
  "transport/schema",
  "health/check",
]

[transport]
kinds = ["http", "rest"]
default_port = 8080
supports_streaming = true
supports_websocket = false

[binary]
default = "animus-transport-http"
